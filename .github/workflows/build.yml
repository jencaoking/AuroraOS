name: CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
# Job 1: Host-native unit tests (GoogleTest + CTest)
# ============================================================================
jobs:
  test:
    name: Unit Tests (host x86)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure (Debug + ASan + UBSan)
        run: |
          cmake -S tests -B build_tests \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DENABLE_ASAN=ON \
                -DENABLE_UBSAN=ON

      - name: Build tests
        run: cmake --build build_tests -j$(nproc)

      - name: Run tests (CTest)
        run: |
          ctest --test-dir build_tests \
                --output-on-failure \
                --parallel $(nproc) \
                --timeout 60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build_tests/Testing/

# ============================================================================
# Job 2: Static analysis (cppcheck)
# ============================================================================
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # Not needed for static analysis

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability,style \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --inline-suppr \
            --std=c++17 \
            --language=c++ \
            --error-exitcode=1 \
            --xml --xml-version=2 \
            -I kernel \
            -I vfs \
            -I syscall \
            -I apps \
            --file-filter="*.cpp" \
            --file-filter="*.hpp" \
            kernel/ vfs/ 2> cppcheck-report.xml
          echo "cppcheck completed"

      - name: Display cppcheck summary
        if: always()
        run: |
          if [ -s cppcheck-report.xml ]; then
            cat cppcheck-report.xml
          else
            echo "No issues found by cppcheck"
          fi

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

# ============================================================================
# Job 3: Firmware build — parallel multi-board matrix
# ============================================================================
  firmware-build:
    name: Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false  # Don't cancel other boards if one fails
      matrix:
        include:
          - board: lm3s6965-qb
            cmake_extra: ""
          - board: miband8
            cmake_extra: "-DCMAKE_TOOLCHAIN_FILE=config/toolchain_miband.cmake"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ARM toolchain & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            cmake \
            ninja-build
          python -m pip install --upgrade pip
          pip install kconfiglib

      - name: Configure CMake (${{ matrix.board }})
        run: |
          cmake -S . -B build_${{ matrix.board }} \
                -G Ninja \
                -DBOARD=${{ matrix.board }} \
                -DCMAKE_TOOLCHAIN_FILE=config/toolchain.cmake \
                ${{ matrix.cmake_extra }}

      - name: Build firmware (${{ matrix.board }})
        run: cmake --build build_${{ matrix.board }} -j$(nproc)

      - name: Upload firmware artifacts (${{ matrix.board }})
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            build_${{ matrix.board }}/auroraOS.elf
            build_${{ matrix.board }}/auroraOS.bin
            build_${{ matrix.board }}/auroraOS.hex
          if-no-files-found: ignore
